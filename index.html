<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Generator Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #2b2b2b; color: #fff; min-height: 100vh; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; font-size: 22px; margin-bottom: 20px; }
        h2 { font-size: 16px; margin-bottom: 10px; }
        .btn {
            padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;
            font-size: 14px; font-family: inherit; color: #fff; transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-green { background: #4CAF50; }
        .btn-gray { background: #757575; }
        .upload-box {
            border: 2px dashed #5c5c5c; border-radius: 8px; padding: 30px 15px;
            text-align: center; background: #3c3c3c; cursor: pointer; transition: all 0.3s;
        }
        .upload-box:hover, .upload-box.dragover { border-color: #4CAF50; background: #3c4c3c; }
        .upload-box p { color: #888; font-size: 14px; margin-top: 8px; }
        .upload-box.done { border-color: #4CAF50; }
        .upload-box.done p { color: #4CAF50; }
        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; margin-top: 15px; }
        .left-col { display: flex; flex-direction: column; gap: 15px; }
        .uploads-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .preview-box {
            background: #3c3c3c; border-radius: 8px; padding: 15px; text-align: center;
            min-height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .preview-box canvas { max-width: 100%; max-height: 350px; border-radius: 4px; }
        .settings-panel { background: #3c3c3c; border-radius: 8px; padding: 15px; }
        .settings-group { margin-bottom: 12px; }
        .settings-group h3 { font-size: 13px; margin-bottom: 6px; color: #4CAF50; }
        .slider-row { margin-bottom: 8px; }
        .slider-row label { display: block; font-size: 11px; color: #ccc; margin-bottom: 2px; }
        .slider-row .sw { display: flex; align-items: center; gap: 6px; }
        .slider-row input[type="range"] { flex: 1; accent-color: #4CAF50; }
        .slider-row .val { font-size: 11px; min-width: 30px; text-align: right; }
        .checkbox-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; font-size: 12px; }
        .checkbox-row input { accent-color: #4CAF50; }
        .input-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; font-size: 12px; }
        .input-row input[type="number"] {
            width: 50px; padding: 3px 5px; background: #2b2b2b; border: 1px solid #555;
            border-radius: 3px; color: #fff; font-size: 12px;
        }
        .hint { font-size: 10px; color: #888; margin-left: 18px; margin-bottom: 6px; }
        .status { margin-top: 10px; padding: 8px; border-radius: 4px; white-space: pre-line; font-size: 13px; }
        .status.success { background: #1b3a1b; color: #4CAF50; }
        .status.error { background: #3a1b1b; color: #f44336; }
        .status.info { background: #1b2a3a; color: #2196F3; }
        .bottom-bar { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
        .progress-bar { margin-top: 10px; display: none; }
        .progress-bar .bar { height: 6px; background: #555; border-radius: 3px; overflow: hidden; }
        .progress-bar .fill { height: 100%; background: #4CAF50; transition: width 0.2s; width: 0%; }
        .progress-bar .text { font-size: 12px; color: #4CAF50; text-align: center; margin-top: 4px; }
        .hidden { display: none; }
        .settings-btns { display: flex; gap: 6px; margin-top: 8px; }
        .settings-btns .btn { flex: 1; font-size: 11px; padding: 5px 8px; }
        @media (max-width: 800px) { .main-layout { grid-template-columns: 1fr; } .uploads-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <h1>Ticket Generator Pro</h1>
    <div class="main-layout">
        <div class="left-col">
            <div class="uploads-row">
                <div>
                    <h2>1. CSV fajl</h2>
                    <div class="upload-box" id="csvBox">
                        <div style="font-size:32px">&#128196;</div>
                        <p>Klikni ili prevuci CSV</p>
                    </div>
                    <input type="file" id="csvInput" accept=".csv" class="hidden">
                </div>
                <div>
                    <h2>2. Dizajn karte (slika)</h2>
                    <div class="upload-box" id="imgBox">
                        <div style="font-size:32px">&#128444;</div>
                        <p>Klikni ili prevuci sliku</p>
                    </div>
                    <input type="file" id="imgInput" accept="image/*" class="hidden">
                </div>
            </div>
            <div class="preview-box" id="previewBox">
                <p style="color:#888">Ucitaj CSV i sliku za preview</p>
            </div>
        </div>
        <div class="settings-panel">
            <h2>Podesavanja</h2>
            <div class="settings-group">
                <h3>QR Kod</h3>
                <div class="slider-row"><label>X pozicija (%):</label><div class="sw"><input type="range" min="0" max="100" value="85" id="qr_x" oninput="onSlider(this)"><span class="val" id="qr_x_v">85</span></div></div>
                <div class="slider-row"><label>Y pozicija (%):</label><div class="sw"><input type="range" min="0" max="100" value="50" id="qr_y" oninput="onSlider(this)"><span class="val" id="qr_y_v">50</span></div></div>
                <div class="slider-row"><label>Velicina (%):</label><div class="sw"><input type="range" min="5" max="50" value="16" id="qr_size" oninput="onSlider(this)"><span class="val" id="qr_size_v">16</span></div></div>
            </div>
            <div class="settings-group">
                <h3 style="color:#FF9800">Redni broj</h3>
                <div class="slider-row"><label>X pozicija (%):</label><div class="sw"><input type="range" min="0" max="100" value="85" id="ord_x" oninput="onSlider(this)"><span class="val" id="ord_x_v">85</span></div></div>
                <div class="slider-row"><label>Y pozicija (%):</label><div class="sw"><input type="range" min="0" max="100" value="30" id="ord_y" oninput="onSlider(this)"><span class="val" id="ord_y_v">30</span></div></div>
                <div class="slider-row"><label>Font:</label><div class="sw"><input type="range" min="10" max="72" value="36" id="ord_fs" oninput="onSlider(this)"><span class="val" id="ord_fs_v">36</span></div></div>
            </div>
            <div class="settings-group">
                <h3 style="color:#2196F3">Ticket ID</h3>
                <div class="slider-row"><label>X pozicija (%):</label><div class="sw"><input type="range" min="0" max="100" value="85" id="tid_x" oninput="onSlider(this)"><span class="val" id="tid_x_v">85</span></div></div>
                <div class="slider-row"><label>Y pozicija (%):</label><div class="sw"><input type="range" min="0" max="100" value="72" id="tid_y" oninput="onSlider(this)"><span class="val" id="tid_y_v">72</span></div></div>
                <div class="slider-row"><label>Font:</label><div class="sw"><input type="range" min="10" max="72" value="24" id="tid_fs" oninput="onSlider(this)"><span class="val" id="tid_fs_v">24</span></div></div>
            </div>
            <hr style="border-color:#555; margin: 8px 0;">
            <div class="input-row"><label for="perPage">Karata po stranici:</label><input type="number" id="perPage" value="4" min="1" max="8"></div>
            <div class="checkbox-row"><input type="checkbox" id="optimizePdf" checked><label for="optimizePdf">Optimizuj PDF</label></div>
            <div class="checkbox-row"><input type="checkbox" id="reorderCut"><label for="reorderCut">Preuredi za sijecenje</label></div>
            <div class="input-row"><label for="pagesPerDeck">Str. po spilu:</label><input type="number" id="pagesPerDeck" value="100" min="1"></div>
            <div class="settings-btns">
                <button class="btn btn-gray" onclick="saveSettings()">Sacuvaj</button>
                <button class="btn btn-gray" onclick="document.getElementById('loadInput').click()">Ucitaj</button>
                <input type="file" id="loadInput" accept=".json" class="hidden">
            </div>
        </div>
    </div>
    <div class="bottom-bar">
        <button class="btn btn-green" id="genBtn" onclick="generate()" disabled>Generisi PDF</button>
    </div>
    <div class="progress-bar" id="progBar">
        <div class="bar"><div class="fill" id="progFill"></div></div>
        <div class="text" id="progText">0%</div>
    </div>
    <div id="statusBox" class="status hidden"></div>
</div>

<script>
let tickets = [], templateDataURL = null, debounceTimer = null;

// CSV Parser
function parseCSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) throw new Error('CSV je prazan');
    const headers = csvLine(lines[0]);
    const find = (...names) => { for (const n of names) { const i = headers.findIndex(h => h.toLowerCase().trim() === n.toLowerCase()); if (i !== -1) return i; } return -1; };
    const ti = find('ticketId','ticket_id','ticketid');
    const qi = find('qrCodeRaw','qrcoderaw','QR Code','qr_code','qrcode','QRCode');
    const ci = find('categoryKey','category_key','categorykey','category');
    if (ti===-1 || qi===-1) throw new Error('Nedostaju kolone: ticketId i/ili QR Code\nPronadjene: '+headers.join(', '));
    const result = [];
    for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const c = csvLine(lines[i]);
        const ticketId = (c[ti]||'').trim();
        let qr = (c[qi]||'').trim();
        if (!ticketId || !qr) continue;
        if (qr.startsWith('http')) { try { const d = new URL(qr).searchParams.get('data'); if (d) qr = decodeURIComponent(d); } catch(e){} }
        else { try { qr = decodeURIComponent(qr); } catch(e){} }
        result.push({ ticketId, qr_code: qr, ordinal: result.length + 1 });
    }
    return result;
}
function csvLine(line) {
    const r=[]; let cur='', inQ=false;
    for (let i=0;i<line.length;i++) { const ch=line[i]; if(inQ){if(ch==='"'){if(i+1<line.length&&line[i+1]==='"'){cur+='"';i++;}else inQ=false;}else cur+=ch;}else{if(ch==='"')inQ=true;else if(ch===','){r.push(cur);cur='';}else cur+=ch;} }
    r.push(cur); return r;
}

// Uploads
const csvBox=document.getElementById('csvBox'), csvInput=document.getElementById('csvInput');
const imgBox=document.getElementById('imgBox'), imgInput=document.getElementById('imgInput');

csvBox.addEventListener('click', () => csvInput.click());
csvBox.addEventListener('dragover', e => { e.preventDefault(); csvBox.classList.add('dragover'); });
csvBox.addEventListener('dragleave', () => csvBox.classList.remove('dragover'));
csvBox.addEventListener('drop', e => { e.preventDefault(); csvBox.classList.remove('dragover'); if(e.dataTransfer.files[0]) handleCSV(e.dataTransfer.files[0]); });
csvInput.addEventListener('change', e => { if(e.target.files[0]) handleCSV(e.target.files[0]); });

async function handleCSV(file) {
    try {
        tickets = parseCSV(await file.text());
        csvBox.classList.add('done');
        csvBox.querySelector('p').textContent = file.name + ' (' + tickets.length + ' karata)';
        showMsg('CSV ucitan: ' + tickets.length + ' karata', 'success');
        checkReady(); updatePreview();
    } catch(e) { showMsg('Greska: '+e.message, 'error'); }
}

imgBox.addEventListener('click', () => imgInput.click());
imgBox.addEventListener('dragover', e => { e.preventDefault(); imgBox.classList.add('dragover'); });
imgBox.addEventListener('dragleave', () => imgBox.classList.remove('dragover'));
imgBox.addEventListener('drop', e => { e.preventDefault(); imgBox.classList.remove('dragover'); if(e.dataTransfer.files[0]) handleImg(e.dataTransfer.files[0]); });
imgInput.addEventListener('change', e => { if(e.target.files[0]) handleImg(e.target.files[0]); });

function handleImg(file) {
    const reader = new FileReader();
    reader.onload = () => { templateDataURL = reader.result; imgBox.classList.add('done'); imgBox.querySelector('p').textContent = file.name; checkReady(); updatePreview(); };
    reader.readAsDataURL(file);
}

function checkReady() { document.getElementById('genBtn').disabled = !(tickets.length && templateDataURL); }

// Settings
function S() {
    return {
        qr_x:N('qr_x'), qr_y:N('qr_y'), qr_size:N('qr_size'),
        ord_x:N('ord_x'), ord_y:N('ord_y'), ord_fs:N('ord_fs'),
        tid_x:N('tid_x'), tid_y:N('tid_y'), tid_fs:N('tid_fs'),
        perPage: parseInt(document.getElementById('perPage').value)||4,
        optimize: document.getElementById('optimizePdf').checked,
        reorder: document.getElementById('reorderCut').checked,
        pagesPerDeck: parseInt(document.getElementById('pagesPerDeck').value)||100
    };
}
function N(id){return parseFloat(document.getElementById(id).value);}
function onSlider(el){document.getElementById(el.id+'_v').textContent=el.value; clearTimeout(debounceTimer); debounceTimer=setTimeout(updatePreview,150);}

function saveSettings() {
    const b=new Blob([JSON.stringify(S(),null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='ticket_settings.json'; a.click();
}
document.getElementById('loadInput').addEventListener('change', async e => {
    const f=e.target.files[0]; if(!f) return;
    try {
        const s=JSON.parse(await f.text());
        ['qr_x','qr_y','qr_size','ord_x','ord_y','ord_fs','tid_x','tid_y','tid_fs'].forEach(k=>{if(s[k]!==undefined){document.getElementById(k).value=s[k];document.getElementById(k+'_v').textContent=s[k];}});
        if(s.perPage) document.getElementById('perPage').value=s.perPage;
        if(s.optimize!==undefined) document.getElementById('optimizePdf').checked=s.optimize;
        if(s.reorder!==undefined) document.getElementById('reorderCut').checked=s.reorder;
        if(s.pagesPerDeck) document.getElementById('pagesPerDeck').value=s.pagesPerDeck;
        updatePreview();
    } catch(e){alert('Greska: '+e.message);}
    e.target.value='';
});

// Canvas rendering
function loadImg(src){return new Promise((res,rej)=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>res(i);i.onerror=rej;i.src=src;});}
async function qrURL(data,size){return await QRCode.toDataURL(data,{width:size,margin:1,color:{dark:'#000',light:'#fff'}});}

async function renderTicket(tplImg, ticketId, qrData, ordinal, s, maxW) {
    const canvas=document.createElement('canvas'), ctx=canvas.getContext('2d');
    let w=tplImg.naturalWidth||tplImg.width, h=tplImg.naturalHeight||tplImg.height, sc=1;
    if(maxW&&maxW<w){sc=maxW/w;w=maxW;h=Math.round(h*sc);}
    canvas.width=w; canvas.height=h;
    ctx.drawImage(tplImg,0,0,w,h);
    const qs=Math.round(w*s.qr_size/100);
    const qx=Math.max(0,Math.round(w*s.qr_x/100-qs/2));
    const qy=Math.max(0,Math.round(h*s.qr_y/100-qs/2));
    const qimg=await loadImg(await qrURL(qrData,qs));
    ctx.drawImage(qimg,qx,qy,qs,qs);
    function txt(text,x,y,fontSize){
        const fs=Math.max(10,Math.round(fontSize*sc));
        ctx.font='bold '+fs+'px Arial,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.strokeStyle='white'; ctx.lineWidth=Math.max(2,fs/5); ctx.strokeText(text,x,y);
        ctx.fillStyle='black'; ctx.fillText(text,x,y);
    }
    if(ordinal!=null) txt(String(ordinal),Math.round(w*s.ord_x/100),Math.round(h*s.ord_y/100),s.ord_fs);
    txt(ticketId,Math.round(w*s.tid_x/100),Math.round(h*s.tid_y/100),s.tid_fs);
    return canvas;
}

async function updatePreview(){
    const box=document.getElementById('previewBox');
    if(!templateDataURL){box.innerHTML='<p style="color:#888">Ucitaj sliku za preview</p>';return;}
    try{const img=await loadImg(templateDataURL);const c=await renderTicket(img,'SAMPLE-TICKET-ID','https://example.com/qr',1,S(),700);box.innerHTML='';box.appendChild(c);}
    catch(e){box.innerHTML='<p style="color:#f44336">Greska u preview-u</p>';}
}

// PDF
function reorder(tix,ppd){
    const tpp=parseInt(document.getElementById('perPage').value)||4, chunk=ppd*tpp, re=[];
    for(let ci=0;ci<Math.ceil(tix.length/chunk);ci++){
        const sl=tix.slice(ci*chunk,ci*chunk+chunk); while(sl.length<chunk)sl.push(null);
        const m=[]; for(let r=0;r<tpp;r++)m.push(sl.slice(r*ppd,(r+1)*ppd));
        for(let c=0;c<ppd;c++)for(let r=0;r<tpp;r++)if(c<m[r].length&&m[r][c])re.push(m[r][c]);
    }
    return re;
}

async function generate(){
    if(!tickets.length||!templateDataURL)return;
    const s=S(), {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pw=210,ph=297,mg=7,tpp=s.perPage;
    const tw=pw-2*mg, th=(ph-(tpp+1)*mg)/tpp;
    let tix=[...tickets]; if(s.reorder) tix=reorder(tix,s.pagesPerDeck);
    const tplImg=await loadImg(templateDataURL);
    const targetW=s.optimize?1400:null, total=tix.length;
    document.getElementById('genBtn').disabled=true;
    showProg(0,'Pocinjem...');
    for(let i=0;i<total;i++){
        const t=tix[i]; if(!t)continue;
        const pos=i%tpp; if(pos===0&&i>0)doc.addPage();
        const tc=await renderTicket(tplImg,t.ticketId,t.qr_code,t.ordinal,s,targetW);
        const imgData=tc.toDataURL(s.optimize?'image/jpeg':'image/png',0.85);
        const yPos=mg+pos*(th+mg);
        const imgAsp=tc.width/tc.height, slotAsp=tw/th;
        let dw,dh,dx,dy;
        if(imgAsp>slotAsp){dw=tw;dh=tw/imgAsp;dx=mg;dy=yPos+(th-dh)/2;}
        else{dh=th;dw=th*imgAsp;dx=mg+(tw-dw)/2;dy=yPos;}
        doc.addImage(imgData,s.optimize?'JPEG':'PNG',dx,dy,dw,dh);
        if((i+1)%2===0||i===total-1){showProg((i+1)/total*100,(i+1)+'/'+total+' karata');await new Promise(r=>setTimeout(r,0));}
    }
    doc.save('tickets.pdf');
    hideProg(); showMsg('PDF generisan! '+total+' karata, '+Math.ceil(total/tpp)+' stranica.','success');
    document.getElementById('genBtn').disabled=false;
}

function showMsg(m,t){const e=document.getElementById('statusBox');e.className='status '+t;e.textContent=m;e.classList.remove('hidden');}
function showProg(p,t){document.getElementById('progBar').style.display='block';document.getElementById('progFill').style.width=p+'%';document.getElementById('progText').textContent=t||Math.round(p)+'%';}
function hideProg(){document.getElementById('progBar').style.display='none';}
</script>
</body>
</html>
